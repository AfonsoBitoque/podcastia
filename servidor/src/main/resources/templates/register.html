<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Criar Conta - Podcastia</title>
</head>

<body>
    <h1>Criar Conta</h1>
    <form id="registerForm" method="post" action="/register">
        <label>Username: <input type="text" name="username" id="username" required></label><br>
        <label>Tag (4 dígitos): <input type="text" name="tag" id="tag" maxlength="4" pattern="\d{4}" required></label>
        <button type="button" onclick="generateTag()">Gerar Tag</button>
        <button type="button" onclick="checkTag()">Verificar Tag</button>
        <span id="tagStatus"></span><br>
        <label>Email: <input type="email" name="email" id="email" required></label><br>
        <label>Password: <input type="password" name="password" id="password" required></label><br>
        <button type="submit" id="submitBtn">Criar Conta</button>
    </form>
    <div style="color:red;">
        <th:block th:if="${error}">
            <p th:text="${error}"></p>
        </th:block>
    </div>
    <div style="color:green;">
        <th:block th:if="${success}">
            <p th:text="${success}"></p>
        </th:block>
    </div>
    <script>
        function generateTag() {
            const username = document.getElementById('username').value;
            if (!username) { alert('Preencha o username primeiro.'); return; }
            fetch(`/register/generate-tag?username=${encodeURIComponent(username)}`)
                .then(r => r.text())
                .then(tag => {
                    document.getElementById('tag').value = tag;
                    document.getElementById('tagStatus').textContent = '';
                });
        }
        function checkTag() {
            const username = document.getElementById('username').value;
            const tag = document.getElementById('tag').value;
            if (!username || !tag) { alert('Preencha username e tag.'); return; }
            fetch(`/register/check-tag?username=${encodeURIComponent(username)}&tag=${encodeURIComponent(tag)}`)
                .then(r => r.text())
                .then(status => {
                    document.getElementById('tagStatus').textContent = status;
                });
        }
        document.getElementById('registerForm').addEventListener('input', function () {
            const username = document.getElementById('username').value;
            const tag = document.getElementById('tag').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = !(username && tag && email && password && tag.length === 4 && /^\d{4}$/.test(tag));
        });
    </script>
</body>

</html>
